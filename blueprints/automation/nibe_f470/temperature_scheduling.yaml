blueprint:
  name: "Nibe F470 - Temperature Scheduling"
  description: >
    Adjusts the heating curve offset based on time of day and weekday/weekend.
    Supports comfort, normal, and economy modes with configurable time windows.
    Optionally integrates with a presence detector to use economy mode when away.
  domain: automation
  input:
    heating_offset:
      name: Heating curve offset
      description: "The myUplink heating offset entity (climate system 1)"
      selector:
        entity:
          filter:
            - integration: myuplink
              domain: number
    morning_start_weekday:
      name: Morning comfort start (weekdays)
      description: "When to switch to comfort mode on weekdays"
      default: "06:00:00"
      selector:
        time:
    evening_eco_start_weekday:
      name: Evening economy start (weekdays)
      description: "When to switch to economy mode on weekday evenings"
      default: "22:00:00"
      selector:
        time:
    morning_start_weekend:
      name: Morning comfort start (weekends)
      description: "When to switch to comfort mode on weekends"
      default: "08:00:00"
      selector:
        time:
    evening_eco_start_weekend:
      name: Evening economy start (weekends)
      description: "When to switch to economy mode on weekend evenings"
      default: "23:00:00"
      selector:
        time:
    daytime_eco_start:
      name: Daytime economy start (weekdays)
      description: "When to reduce heating during weekday daytime (e.g., when at work). Set same as morning to disable."
      default: "09:00:00"
      selector:
        time:
    daytime_eco_end:
      name: Daytime economy end (weekdays)
      description: "When to resume comfort before arriving home"
      default: "15:00:00"
      selector:
        time:
    comfort_offset:
      name: Comfort mode offset
      description: "Heating offset during comfort hours"
      default: 2
      selector:
        number:
          min: -5
          max: 10
          step: 1
    normal_offset:
      name: Normal mode offset
      description: "Heating offset during normal hours"
      default: 0
      selector:
        number:
          min: -5
          max: 5
          step: 1
    economy_offset:
      name: Economy mode offset
      description: "Heating offset during economy/sleep hours"
      default: -2
      selector:
        number:
          min: -10
          max: 0
          step: 1
    away_offset:
      name: Away mode offset
      description: "Heating offset when nobody is home (requires presence sensor)"
      default: -4
      selector:
        number:
          min: -10
          max: 0
          step: 1
    presence_sensor:
      name: Presence sensor (optional)
      description: "A person or group entity to detect if anyone is home. Leave empty to disable."
      default: {}
      selector:
        entity:
          filter:
            - domain:
                - person
                - group
                - binary_sensor

mode: restart

trigger:
  - platform: time_pattern
    minutes: "/15"
    id: time_check
  - platform: state
    entity_id: !input presence_sensor
    not_from:
      - "unavailable"
      - "unknown"
    not_to:
      - "unavailable"
      - "unknown"
    id: presence_change

variables:
  heating_offset_entity: !input heating_offset
  presence: !input presence_sensor
  is_home: >-
    {% if presence is string and presence != '' %}
      {{ states(presence) == 'home' or states(presence) == 'on' }}
    {% else %}
      true
    {% endif %}
  comfort: !input comfort_offset
  normal: !input normal_offset
  economy: !input economy_offset
  away: !input away_offset
  is_weekday: "{{ now().isoweekday() <= 5 }}"
  morning_wd: !input morning_start_weekday
  evening_wd: !input evening_eco_start_weekday
  morning_we: !input morning_start_weekend
  evening_we: !input evening_eco_start_weekend
  day_eco_start: !input daytime_eco_start
  day_eco_end: !input daytime_eco_end
  current_time: "{{ now().strftime('%H:%M:%S') }}"
  morning_start: "{{ morning_wd if is_weekday else morning_we }}"
  evening_start: "{{ evening_wd if is_weekday else evening_we }}"
  target_offset: >-
    {% if not is_home %}
      {{ away }}
    {% elif current_time < morning_start or current_time >= evening_start %}
      {{ economy }}
    {% elif is_weekday and current_time >= day_eco_start and current_time < day_eco_end %}
      {{ normal }}
    {% else %}
      {{ comfort }}
    {% endif %}

action:
  - condition: template
    value_template: >-
      {{ states(heating_offset_entity) | int(0) != target_offset | int }}
  - service: number.set_value
    target:
      entity_id: !input heating_offset
    data:
      value: "{{ target_offset | int }}"
