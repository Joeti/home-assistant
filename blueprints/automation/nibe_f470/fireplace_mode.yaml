blueprint:
  name: "Nibe F470 - Fireplace Mode"
  description: >
    Toggles the heat pump's air conditioning into fireplace mode when
    an input_boolean is turned on, and restores it to normal when
    turned off. Use a dashboard button or automation to toggle the helper.
    Optionally auto-disables after a configurable duration.
    Supports both number and select entities from myUplink.
  domain: automation
  input:
    fireplace_toggle:
      name: Fireplace mode toggle
      description: "An input_boolean helper that controls fireplace mode on/off"
      selector:
        entity:
          filter:
            - domain: input_boolean
    ac_mode_entity:
      name: Air conditioning mode entity
      description: >
        The myUplink entity for air conditioning / ventilation mode.
        This can be a number or select entity — look for entities with
        'ventilation', 'priority', 'air', or 'climate' in the name.
      selector:
        entity:
          filter:
            - integration: myuplink
              domain:
                - number
                - select
    fireplace_value:
      name: Fireplace mode value
      description: "The value that activates fireplace mode (number or option name)"
      default: "3"
      selector:
        text:
    normal_value:
      name: Normal mode value
      description: "The value for normal operation (number or option name)"
      default: "0"
      selector:
        text:
    auto_off_enabled:
      name: Auto-disable fireplace mode
      description: "Automatically turn off fireplace mode after a set duration"
      default: true
      selector:
        boolean:
    auto_off_duration:
      name: Auto-disable duration (hours)
      description: "Turn off fireplace mode after this many hours (if auto-disable is enabled)"
      default: 3
      selector:
        number:
          min: 0.5
          max: 12
          step: 0.5
          unit_of_measurement: "h"

mode: restart

trigger:
  - platform: state
    entity_id: !input fireplace_toggle
    to: "on"
    not_from:
      - "unavailable"
      - "unknown"
    id: fireplace_on
  - platform: state
    entity_id: !input fireplace_toggle
    to: "off"
    not_from:
      - "unavailable"
      - "unknown"
    id: fireplace_off

variables:
  fireplace_val: !input fireplace_value
  normal_val: !input normal_value
  auto_off: !input auto_off_enabled
  duration_hours: !input auto_off_duration
  toggle_entity: !input fireplace_toggle
  ac_entity: !input ac_mode_entity
  ac_domain: "{{ ac_entity.split('.')[0] }}"

action:
  - choose:
      # Fireplace mode ON
      - conditions:
          - condition: trigger
            id: fireplace_on
        sequence:
          - if:
              - condition: template
                value_template: "{{ ac_domain == 'number' }}"
            then:
              - service: number.set_value
                target:
                  entity_id: !input ac_mode_entity
                data:
                  value: "{{ fireplace_val }}"
            else:
              - service: select.select_option
                target:
                  entity_id: !input ac_mode_entity
                data:
                  option: "{{ fireplace_val }}"
          - if:
              - condition: template
                value_template: "{{ auto_off }}"
            then:
              - delay:
                  hours: "{{ duration_hours | int }}"
                  minutes: "{{ ((duration_hours % 1) * 60) | int }}"
              - service: input_boolean.turn_off
                target:
                  entity_id: !input fireplace_toggle

      # Fireplace mode OFF
      - conditions:
          - condition: trigger
            id: fireplace_off
        sequence:
          - if:
              - condition: template
                value_template: "{{ ac_domain == 'number' }}"
            then:
              - service: number.set_value
                target:
                  entity_id: !input ac_mode_entity
                data:
                  value: "{{ normal_val }}"
            else:
              - service: select.select_option
                target:
                  entity_id: !input ac_mode_entity
                data:
                  option: "{{ normal_val }}"
